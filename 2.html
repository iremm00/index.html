    <!DOCTYPE html>

    <title>Büyük Form</title>
    <style>
        body {
            background-color: #f0f8ff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 600px;
            font-family: Arial, sans-serif;
        }
    
        .a {
            width: 400px; 
            padding: 30px;
            background-color: #20b2aa; 
            border-radius: 15px;
           
        }
    
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 18px;
        }
    
        
    
        .radio-group {
            margin: 10px 0;
            font-size: 18px;
            color: #fff;
        }
    
       
    </style>
    </head>
    <body>
        <form>
            <div class="a">
                <input type="text" name="ad" placeholder="Ad"><br/>
                <input type="text" name="soyad" placeholder="Soyad"><br/>
                <label>Cinsiyet:</label><br/>
                <div class="radio-group">
                    <input type="radio" name="k" id="kadın"><label for="kadın">Kadın</label><br/>
                    <input type="radio" name="k" id="erkek"><label for="erkek">Erkek</label><br/>
                </div>
            </div>
        </form>
    </body>
